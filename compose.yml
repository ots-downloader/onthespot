services:
  onthespot:
    container_name: onthespot
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: build
    # Spotify Connect uses mDNS plus the pairing port configured by OnTheSpot. Bridge
    # networking hides both from devices on the LAN, so the Unraid deployment
    # must share the host network for the OnTheSpot worker to appear in Spotify.
    network_mode: host
    # For multi-NIC hosts, set this to the LAN address that Spotify clients use.
    # environment:
    #   ONTHESPOT_SPOTIFY_CONNECT_INTERFACE: 192.168.1.10
    volumes:
      - ./otsdata/Music:/root/Music/OnTheSpot
      - ./otsdata/Videos:/root/Videos/OnTheSpot
      - ./otsdata/Config:/root/.config/onthespot
    restart: unless-stopped
